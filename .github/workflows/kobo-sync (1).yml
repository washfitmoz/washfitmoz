name: Kobo Sync

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora
  workflow_dispatch:        # Botão manual

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar pasta data
        run: mkdir -p data

      - name: Buscar dados Kobo e criar JS
        run: |
          echo "A buscar dados do KoboToolbox..."
          
          # Fetch raw JSON
          curl -s \
            -H "Authorization: Token ${{ secrets.KOBO_TOKEN }}" \
            "https://kf.kobotoolbox.org/api/v2/assets/${{ secrets.KOBO_UID }}/data/?format=json&limit=500" \
            -o data/kobo.json
          
          echo "Submissões recebidas:"
          python3 -c "
          import json
          with open('data/kobo.json') as f:
              d = json.load(f)
          count = d.get('count', 0)
          print(f'  Total: {count}')
          
          # Create kobo-data.js with data embedded as JS variable
          # Dashboard loads this as a script tag - no fetch, no CORS
          js_content = f'/* Auto-generated by GitHub Actions - {__import__(\"datetime\").datetime.utcnow().strftime(\"%Y-%m-%d %H:%M UTC\")} */\n'
          js_content += f'window.KOBO_STATIC_DATA = {json.dumps(d, ensure_ascii=False)};\n'
          js_content += f'window.KOBO_STATIC_LOADED = true;\n'
          js_content += f'if(window.onKoboStaticLoaded) window.onKoboStaticLoaded(window.KOBO_STATIC_DATA);\n'
          
          with open('data/kobo-data.js', 'w', encoding='utf-8') as f:
              f.write(js_content)
          print(f'  kobo-data.js criado ({len(js_content)} chars)')
          "

      - name: Commit e push
        run: |
          git config user.name "Kobo Sync Bot"
          git config user.email "kobo-sync@washfit.mz"
          git add data/
          git diff --staged --quiet || git commit -m "Kobo sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
