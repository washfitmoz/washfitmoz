name: Kobo Sync

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora automaticamente
  workflow_dispatch:        # Botão manual no GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Criar pasta data
        run: mkdir -p data

      - name: Buscar dados do KoboToolbox
        run: |
          echo "A sincronizar dados do Kobo..."
          curl -s \
            -H "Authorization: Token ${{ secrets.KOBO_TOKEN }}" \
            "https://kf.kobotoolbox.org/api/v2/assets/${{ secrets.KOBO_UID }}/data/?format=json&limit=500" \
            -o data/kobo.json
          echo "Linhas no ficheiro:"
          wc -c data/kobo.json
          echo "Pré-visualização:"
          python3 -c "
          import json
          with open('data/kobo.json') as f:
              d = json.load(f)
          print(f'Submissões: {d.get(\"count\", 0)}')
          "

      - name: Guardar timestamp
        run: |
          echo "{\"synced_at\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > data/last_sync.json

      - name: Commit e push
        run: |
          git config user.name "Kobo Sync Bot"
          git config user.email "kobo-sync@washfit.mz"
          git add data/
          git diff --staged --quiet || git commit -m "Kobo sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
